<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Image Model Comparison — MindStudio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      padding: 2rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.1em;
      color: #fff;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 0.8rem;
      color: #666;
      letter-spacing: 0.05em;
    }

    /* Main comparison grid: 1 label col + 6 model cols */
    .compare-grid {
      display: grid;
      grid-template-columns: 130px repeat(6, 1fr);
      gap: 6px;
    }

    /* Sticky header row */
    .col-header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: #111;
      padding: 0.6rem 0.3rem 1rem;
      text-align: center;
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #aaa;
    }

    .col-header.empty { background: transparent; }

    /* Row label */
    .row-label {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding-right: 0.75rem;
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #666;
      text-align: right;
      line-height: 1.3;
    }

    .row-sep {
      grid-column: 1 / -1;
      height: 12px;
    }

    .img-cell img {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      border-radius: 5px;
      display: block;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      background: #222;
    }

    .img-cell img:hover {
      transform: scale(1.04);
      box-shadow: 0 0 0 2px #fff4;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.93);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 0.75rem;
    }

    #lightbox.active { display: flex; }

    #lightbox img {
      max-width: 90vw;
      max-height: 82vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 0 60px rgba(0,0,0,0.8);
    }

    #lightbox-meta { text-align: center; line-height: 1.6; }
    #lightbox-model { font-size: 0.95rem; font-weight: 600; color: #fff; letter-spacing: 0.05em; }
    #lightbox-group { font-size: 0.75rem; color: #888; letter-spacing: 0.08em; text-transform: uppercase; }

    #lightbox-close {
      position: fixed; top: 1.25rem; right: 1.5rem;
      font-size: 2rem; color: #888; cursor: pointer;
      background: none; border: none; line-height: 1;
    }
    #lightbox-close:hover { color: #fff; }

    #lightbox-prev, #lightbox-next {
      position: fixed; top: 50%; transform: translateY(-50%);
      font-size: 2.5rem; color: #666; cursor: pointer;
      background: none; border: none; padding: 0 1rem; line-height: 1;
    }
    #lightbox-prev:hover, #lightbox-next:hover { color: #fff; }
    #lightbox-prev { left: 0.5rem; }
    #lightbox-next { right: 0.5rem; }
  </style>
</head>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">&times;</button>
  <button id="lightbox-prev">&#8249;</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-meta">
    <div id="lightbox-model"></div>
    <div id="lightbox-group"></div>
  </div>
  <button id="lightbox-next">&#8250;</button>
</div>

<script>
  const allImages = Array.from(document.querySelectorAll('.img-cell img'));
  let currentIndex = 0;

  const lightbox = document.getElementById('lightbox');
  const lbImg    = document.getElementById('lightbox-img');
  const lbModel  = document.getElementById('lightbox-model');
  const lbGroup  = document.getElementById('lightbox-group');

  function openLightbox(index) {
    currentIndex = index;
    const img = allImages[index];
    lbImg.src = img.src;
    lbModel.textContent = img.dataset.model;
    lbGroup.textContent = img.dataset.group;
    lightbox.classList.add('active');
  }

  function closeLightbox() { lightbox.classList.remove('active'); }

  function navigate(dir) {
    currentIndex = (currentIndex + dir + allImages.length) % allImages.length;
    openLightbox(currentIndex);
  }

  allImages.forEach((img, i) => img.addEventListener('click', () => openLightbox(i)));
  document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
  document.getElementById('lightbox-prev').addEventListener('click', () => navigate(-1));
  document.getElementById('lightbox-next').addEventListener('click', () => navigate(1));
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'ArrowLeft')  navigate(-1);
    if (e.key === 'ArrowRight') navigate(1);
    if (e.key === 'Escape')     closeLightbox();
  });
</script>
